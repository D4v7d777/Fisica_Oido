<svg width="1200" height="820" viewBox="0 0 1200 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cochlea" x1="490" y1="178" x2="822" y2="546" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2E7DB5"/>
      <stop offset="0.42" stop-color="#25A18E"/>
      <stop offset="1" stop-color="#D88C55"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="820" rx="34" fill="#FFF8EA"/>
  <rect x="46" y="44" width="1108" height="732" rx="28" fill="#FFFDF7" stroke="#E2D2B5" stroke-width="4"/>

  <text x="82" y="116" fill="#23344A" font-family="Verdana, sans-serif" font-size="42" font-weight="700">
    Tonotopía coclear
  </text>
  <text x="82" y="154" fill="#5C6A7B" font-family="Verdana, sans-serif" font-size="24">
    La onda viajera alcanza máximos distintos según la frecuencia
  </text>

  <path d="M792 236C712 178 586 190 512 296C442 398 470 522 564 588C646 646 760 628 826 546C880 480 886 390 844 328" stroke="url(#cochlea)" stroke-width="48" stroke-linecap="round"/>
  <path d="M754 300C706 268 626 278 582 342C536 408 554 490 620 532C682 572 760 552 800 496C836 446 836 372 790 328" stroke="#FFF3E5" stroke-width="18" stroke-linecap="round"/>
  <path d="M730 352C700 334 650 342 622 384C592 426 604 480 644 506C686 532 740 516 766 478C790 444 784 392 748 364" stroke="#D7EAFB" stroke-width="10" stroke-linecap="round"/>

  <circle cx="866" cy="524" r="18" fill="#D88C55"/>
  <circle cx="514" cy="292" r="18" fill="#2E7DB5"/>
  <path d="M514 292L364 248" stroke="#2E7DB5" stroke-width="6" stroke-linecap="round"/>
  <path d="M866 524L1014 596" stroke="#D88C55" stroke-width="6" stroke-linecap="round"/>

  <text x="144" y="248" fill="#2E7DB5" font-family="Verdana, sans-serif" font-size="30" font-weight="700">
    Base
  </text>
  <text x="144" y="286" fill="#516173" font-family="Verdana, sans-serif" font-size="22">
    rígida y estrecha
  </text>
  <text x="144" y="322" fill="#2E7DB5" font-family="Verdana, sans-serif" font-size="24">
    responde mejor a altas frecuencias
  </text>

  <text x="868" y="640" fill="#D88C55" font-family="Verdana, sans-serif" font-size="30" font-weight="700">
    Ápice
  </text>
  <text x="868" y="678" fill="#516173" font-family="Verdana, sans-serif" font-size="22">
    más ancho y flexible
  </text>
  <text x="868" y="714" fill="#B35E43" font-family="Verdana, sans-serif" font-size="24">
    responde mejor a bajas frecuencias
  </text>

  <g>
    <rect x="88" y="566" width="318" height="124" rx="24" fill="#E5F1FF"/>
    <text x="116" y="618" fill="#215399" font-family="Verdana, sans-serif" font-size="26" font-weight="700">
      Frecuencias altas
    </text>
    <text x="116" y="656" fill="#4E6278" font-family="Verdana, sans-serif" font-size="20">
      Se amortiguan pronto y excitan regiones basales.
    </text>
  </g>

  <g>
    <rect x="88" y="404" width="318" height="124" rx="24" fill="#DDF1EC"/>
    <text x="116" y="456" fill="#0F766E" font-family="Verdana, sans-serif" font-size="26" font-weight="700">
