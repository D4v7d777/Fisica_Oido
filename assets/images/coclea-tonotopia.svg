    </text>
  </g>

  <g>
    <rect x="88" y="242" width="318" height="124" rx="24" fill="#F8E7D7"/>
    <text x="116" y="294" fill="#B35E43" font-family="Verdana, sans-serif" font-size="26" font-weight="700">
