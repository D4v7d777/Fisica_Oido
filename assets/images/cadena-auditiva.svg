    <text x="176" y="542" fill="#23344A" font-family="Verdana, sans-serif" font-size="28" font-weight="700">Huesecillos</text>
    <text x="176" y="578" fill="#5D6A7C" font-family="Verdana, sans-serif" font-size="22">transmiten y mejoran el acoplamiento</text>
  </g>

