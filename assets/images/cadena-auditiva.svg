  <g fill="#5D6A7C" font-family="Verdana, sans-serif" font-size="21">
    <text x="430" y="560">1. El aire transporta la perturbación hasta el tímpano.</text>
    <text x="430" y="598">2. La membrana la convierte en vibración mecánica.</text>
    <text x="430" y="636">3. Los huesecillos transfieren energía a la ventana oval.</text>
    <text x="430" y="674">4. El fluido coclear oscila y las células ciliadas responden.</text>
  </g>
