  <text x="88" y="120" fill="#23344A" font-family="Verdana, sans-serif" font-size="42" font-weight="700">
    Del tímpano a la cóclea
  </text>
  <text x="88" y="158" fill="#5D6A7C" font-family="Verdana, sans-serif" font-size="24">
    Secuencia mecánica y sensorial del sonido en el oído
  </text>

  <g>
    <circle cx="124" cy="278" r="28" fill="#0F766E"/>
    <text x="116" y="288" fill="white" font-family="Verdana, sans-serif" font-size="28" font-weight="700">1</text>
    <text x="176" y="286" fill="#23344A" font-family="Verdana, sans-serif" font-size="28" font-weight="700">Onda de presión</text>
    <text x="176" y="322" fill="#5D6A7C" font-family="Verdana, sans-serif" font-size="22">entra por el conducto auditivo</text>
  </g>

  <g>
    <circle cx="124" cy="406" r="28" fill="#B35E43"/>
    <text x="114" y="416" fill="white" font-family="Verdana, sans-serif" font-size="28" font-weight="700">2</text>
    <text x="176" y="414" fill="#23344A" font-family="Verdana, sans-serif" font-size="28" font-weight="700">Tímpano</text>
    <text x="176" y="450" fill="#5D6A7C" font-family="Verdana, sans-serif" font-size="22">vibra como una membrana forzada</text>
  </g>

  <g>
